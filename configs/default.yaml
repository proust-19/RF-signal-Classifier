experiment:
  name: rf_signal_classifier
  seed: 42

data:
  n_samples: 10000
  snr_db_range: [0, 20]
  signal_length: 1024
  train_ratio: 0.8

model:
  arch: cnn  # cnn or cnn_lstm
  num_classes: 6
  base_filters: 32

training:
  batch_size: 32
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  device: auto  # auto, cpu, or cuda

export:
  onnx_path: models/rf_classifier.onnx
  quantized_path: models/rf_classifier_int8.onnx
  opset_version: 13
  input_shape: [1, 2, 1024]
